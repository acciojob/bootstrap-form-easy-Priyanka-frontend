<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
	<div class='container'>
		<form class="needs-validation" novalidate>
		<div class='row'>
			<h2 class='text-center mt-3 mb-5'>Intenship Form</h2>
		</div>
		<div class='row'>
			<div class='col-sm-4'>
				<label for='first-name-input' class="form-label">First Name</label>
				<input type="text" id='first-name-input' 
					class="form-control" 
					placeholder="First name" required />
				<div class="invalid-feedback">
                    First name required!
                </div>
			</div>
			<div class='col-sm-4'>
				<label for='last-name-input' class="form-label">Last Name</label>
				<input type="text" id='last-name-input' 
					class="form-control" 
					placeholder="Last name" required />
				<div class="invalid-feedback">
                    Last name required!
                </div>
			</div>
			<div class='col-sm-4'>
				<label for='email-input' class="form-label">Email Address</label>
				<input type="email" id='email-input' 
					class="form-control" 
					placeholder="xyz@abc.com" required />
				<div class="invalid-feedback">
                    Email required!
                </div>
			</div>
		</div>
		<div class='row mt-4'>
			<div class='col-sm-4'>
				<label for='college-input' class="form-label">College</label>
				<input type="text" id='college-input' 
					class="form-control" 
					placeholder="First name" required />
				<div class="invalid-feedback">
                    Please provide a valid college.
                </div>
			</div>
			<div class='col-sm-4'>
				<label for='grad-year-select' class="form-label">Graduation Year</label>
				<select class="form-select" id='grad-year-select' required>
					<option value=''>Choose...</option>
					<option value="2020">2020</option>
					<option value="2021">2021</option>
					<option value="2022">2022</option>
					<option value="2023">2023</option>
				</select>
				<div class="invalid-feedback">
                    Please select a valid Graduation Year.
                </div>
			</div>
			<div class='col-sm-4'>
				<label for='roll-no-input' class="form-label">Roll No.</label>
				<input type="text" id='roll-no-input' 
					class="form-control" 
					placeholder="xyz@abc.com" required />
				<div class="invalid-feedback">
                    Please provide a valid Roll no.
                </div>
			</div>
		</div>
		<div class='row mt-5'>
			<div class="form-check ms-3">
            <input
                class="form-check-input"
                type="checkbox"
                id="conditions-checkbox"
                required
            />
			<label class="form-check-label" for="conditions-checkbox">
                Agree to terms and conditions
            </label>
			<div class="invalid-feedback">
                You must agree before submitting.
            </div>
		</div>
			<div class='mt-3 ms-2'>
				<button type="submit" class="btn btn-primary">
		            Submit form
		        </button>
			</div>
		</form>
	</div>
	
    <script type="text/javascript" src="./script.js"></script>

</body>

</html>
